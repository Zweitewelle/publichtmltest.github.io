<!DOCTYPE html>
<html>
<body>

  <!--Style formatting, green opaticy-->
  <style>
div.first {
  background: rgba(0, 128, 0, 0.3);
}
  </style>


<h1>JavaScript Math</h1>
<h2>The Math.random() Method</h2>
<p>Math.random()*10 returns a random integer between 1 and 10 (inclusive):</p>

<p id="demo"></p>

<script>
let x = Math.floor((Math.random() * 10) + 1);
document.getElementById("demo").innerHTML = x;
</script>


  <!-- add heading with green opacity background-->
<div class="first">
  <h1>30% opacity</h1>
</div>

  <button type="button" onclick="alert('Hello world!')">Click Me!</button>
  
</body>
</html>
